services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: convfinqa-app
    env_file:
      - .env

    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    command: python -m src.main

  postgres:
    image: pgvector/pgvector:pg16
    container_name: convfinqa-postgres
    environment:
      POSTGRES_DB: convfinqa
      POSTGRES_USER: convfinqa
      POSTGRES_PASSWORD: convfinqa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convfinqa -d convfinqa"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: convfinqa-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data: